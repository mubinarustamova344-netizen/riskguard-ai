<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – RiskGuard AI</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--navy); }
    .login-card {
      width: 100%; max-width: 420px;
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      box-shadow: var(--sh-xl);
    }
    .login-logo { font-size: 2.5rem; color: var(--accent); margin-bottom: .5rem; }
    .login-title { color: #fff; font-weight: 700; font-size: 1.5rem; }
    .login-subtitle { color: rgba(255,255,255,.5); font-size: .875rem; }
    .form-label { color: rgba(255,255,255,.75); font-size: .875rem; font-weight: 500; }
    .form-control {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      border-radius: var(--radius-sm);
      padding: .65rem 1rem;
    }
    .form-control:focus {
      background: rgba(255,255,255,.09);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-control::placeholder { color: rgba(255,255,255,.3); }
    .btn-login {
      background: var(--accent);
      color: var(--navy);
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      padding: .7rem;
      font-size: .95rem;
      transition: background var(--trans), transform var(--trans);
    }
    .btn-login:hover { background: var(--accent-lt); transform: translateY(-1px); }
    .input-group-text {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.5);
    }
    .form-check-label { color: rgba(255,255,255,.6); font-size: .85rem; }
    .form-check-input { background-color: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); }
  </style>
</head>
<body>

<div class="login-card">
  <!-- Logo -->
  <div class="text-center mb-4">
    <div class="login-logo"><i class="bi bi-shield-check"></i></div>
    <div class="login-title">RiskGuard <span style="color:var(--accent);">AI</span></div>
    <div class="login-subtitle mt-1">Admin Portal — Please sign in</div>
  </div>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 mb-3" role="alert" style="font-size:.875rem;">
        <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
      </div>
    {% endfor %}
  {% endwith %}

  <!-- Form -->
  <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label" for="username">Email</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" class="form-control" id="username" name="username"
               placeholder="your@email.com" autocomplete="username" required autofocus>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="password">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
        <button class="btn btn-outline-secondary border-0" type="button"
                style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)!important;color:rgba(255,255,255,.5);"
                onclick="togglePwd()">
          <i class="bi bi-eye" id="pwdIcon"></i>
        </button>
      </div>
    </div>

    <div class="mb-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="remember" name="remember">
        <label class="form-check-label" for="remember">Remember me</label>
      </div>
    </div>

    <button type="submit" class="btn btn-login w-100">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd() {
    const inp = document.getElementById('password');
    const ico = document.getElementById('pwdIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.className = 'bi bi-eye-slash';
    } else {
      inp.type = 'password';
      ico.className = 'bi bi-eye';
    }
  }


</script>
</body>
</html>
